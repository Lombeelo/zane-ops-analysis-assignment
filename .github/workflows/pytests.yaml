name: Django Tests

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-pytests
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }} # cancel in progress on push (only if not on `main`)

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        apps: [zane_api, container_registry, git_connectors, compose] # Split into 5 parallel jobs

    services:
      loki:
        image: fredkiss3/grafana-loki:3.4
        ports:
          - "3100:3100"
        volumes:
          - loki-data:/loki
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zane
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5434:5432
      proxy:
        image: ghcr.io/zane-ops/proxy:canary
        ports:
          - "2020:2020"
        env:
          CADDY_ADMIN: 0.0.0.0:2020

    steps:
      - uses: actions/checkout@v4

      - name: Read Python version
        id: python-version
        run: echo "version=$(cat ./backend/.python-version)" >> $GITHUB_OUTPUT

      - name: Set up Python ${{ steps.python-version.outputs.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-py313-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-py313-

      - name: Install dependencies
        run: |
          cd backend
          pip install uv
          pip install semgrep
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version
          docker run -d --name zap -p 8080:8080 owasp/zap2docker-stable zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true
          for i in {1..30}; do
            docker logs zap 2>&1 | grep "ZAP .*started" && break || sleep 2
          done
          mkdir -p security-reports
          uv sync --locked --no-dev --no-install-project
          uv sync --locked --no-dev --no-editable

      - name: Run Semgrep (JSON output)
        run: |
          mkdir -p security-reports
          semgrep --config=r2c --json --output=security-reports/semgrep.json || true

      - name: Trivy filesystem scan + SBOM (CycloneDX) and vuln report (JSON)
        run: |
          mkdir -p security-reports
          trivy fs --format cyclonedx --output security-reports/trivy-sbom.cyclonedx.xml .
          trivy fs --format json --output security-reports/trivy-vulns.json .

      - name: Run tests for app ${{ matrix.apps }}
        run: |
          cd backend
          source .venv/bin/activate
          python manage.py runserver --keepdb

      - name: Run quick OWASP ZAP baseline scan 
        run: |
          mkdir -p security-reports
          # Start a simple local server if you have static files; replace with your app start if needed
          docker run --rm --network host owasp/zap2docker-stable zap-baseline.py -t http://zane.example.com -r /tmp/zap_report.html -J /tmp/zap_report.json -z "-config api.disablekey=true"
          cp /tmp/zap_report.json security-reports/zap-report.json || true
          
      - name: Upload reports as job artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: security-reports
          
      - name: Run security gate script
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          # run the gate script (it reads files under security-reports/)
          python security_gate.py
